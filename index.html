<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игры</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 { color: #fff; margin-bottom: 30px; }
        .menu { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .game-btn {
            padding: 20px 40px;
            font-size: 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .game-btn:hover { transform: scale(1.1); }
        .btn-tetris { background: #e74c3c; color: white; }
        .btn-arkanoid { background: #3498db; color: white; }
        .btn-snake { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <h1>Выбери игру</h1>
    <div class="menu">
        <a href="tetris/index.html" class="game-btn btn-tetris">Тетрис</a>
        <a href="arkanoid/index.html" class="game-btn btn-arkanoid">Арканоид</a>
        <a href="snake/index.html" class="game-btn btn-snake">Змейка</a>
    </div>
</body>
</html>

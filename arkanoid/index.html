<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арканоид</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 { color: #fff; margin-bottom: 20px; }
        canvas { border: 3px solid #fff; background: #000; }
        .score { color: #fff; font-size: 24px; margin-bottom: 10px; }
        .back { margin-top: 20px; padding: 10px 30px; font-size: 18px; background: #95a5a6; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Арканоид</h1>
    <div class="score">Очки: <span id="score">0</span></div>
    <canvas id="canvas" width="400" height="300"></canvas>
    <a href="../index.html" class="back">Назад</a>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0, paddle = {x:150,y:280,w:80,h:15}, ball = {x:200,y:200,vx:2,vy:-2}, bricks = [];

        function initBricks() {
            bricks = [];
            for(let r=0;r<5;r++)
                for(let c=0;c<8;c++)
                    bricks.push({x:c*50+5,y:r*20+5,w:40,h:15,c:['#e74c3c','#f1c40f','#2ecc71','#3498db','#9b59b6'][r]});
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,400,300);
            bricks.forEach(b=>{ if(b.c) { ctx.fillStyle=b.c; ctx.fillRect(b.x,b.y,b.w,b.h); } });
            ctx.fillStyle = '#fff';
            ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
            ctx.beginPath();
            ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
            ctx.fill();
        }

        function update() {
            ball.x += ball.vx;
            ball.y += ball.vy;
            if(ball.x<8||ball.x>392) ball.vx *= -1;
            if(ball.y<8) ball.vy *= -1;
            if(ball.y>285&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w) {
                ball.vy = -Math.abs(ball.vy);
                ball.vx += (ball.x-(paddle.x+40))/20;
            }
            if(ball.y>300) { score=0; scoreEl.textContent=0; ball={x:200,y:200,vx:2,vy:-2}; initBricks(); }
            bricks.forEach(b=>{
                if(b.c&&ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h) {
                    b.c=null; ball.vy *= -1; score+=10; scoreEl.textContent=score;
                }
            });
            if(!bricks.some(b=>b.c)) initBricks();
            draw();
        }

        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft'&&paddle.x>0) paddle.x -= 15;
            if(e.key==='ArrowRight'&&paddle.x<320) paddle.x += 15;
        });

        initBricks();
        draw();
        setInterval(update,20);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        h1 { color: #fff; margin-bottom: 20px; }
        canvas { border: 3px solid #fff; background: #000; }
        .score { color: #fff; font-size: 24px; margin-bottom: 10px; }
        .back { margin-top: 20px; padding: 10px 30px; font-size: 18px; background: #95a5a6; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body>
    <h1>Змейка</h1>
    <div class="score">Очки: <span id="score">0</span></div>
    <canvas id="canvas" width="400" height="400"></canvas>
    <a href="../index.html" class="back">Назад</a>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        let score = 0, snake = [{x:10,y:10}], food = {x:15,y:15}, dir = {x:1,y:0};

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0,0,400,400);
            ctx.fillStyle = '#2ecc71';
            snake.forEach(s=>ctx.fillRect(s.x*20,s.y*20,18,18));
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(food.x*20,food.y*20,18,18);
        }

        function update() {
            let head = {x:snake[0].x+dir.x,y:snake[0].y+dir.y};
            if(head.x<0||head.x>19||head.y<0||head.y>19||snake.some(s=>s.x===head.x&&s.y===head.y)) {
                snake=[{x:10,y:10}]; score=0; scoreEl.textContent=0; dir={x:1,y:0}; food={x:15,y:15};
                draw(); return;
            }
            snake.unshift(head);
            if(head.x===food.x&&head.y===food.y) { score+=10; scoreEl.textContent=score; food={x:Math.floor(Math.random()*20),y:Math.floor(Math.random()*20)}; }
            else snake.pop();
            draw();
        }

        document.addEventListener('keydown',e=>{
            if(e.key==='ArrowLeft'&&dir.x!==1) dir={x:-1,y:0};
            else if(e.key==='ArrowRight'&&dir.x!==-1) dir={x:1,y:0};
            else if(e.key==='ArrowUp'&&dir.y!==1) dir={x:0,y:-1};
            else if(e.key==='ArrowDown'&&dir.y!==-1) dir={x:0,y:1};
        });

        draw();
        setInterval(update,100);
    </script>
</body>
</html>

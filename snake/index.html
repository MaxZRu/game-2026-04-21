<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #0d2818, #1a4731, #0d2818);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0,255,100,0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0,255,200,0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        h1 {
            color: #0f0;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
            animation: glow 2s ease-in-out infinite alternate;
            z-index: 1;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
            to { text-shadow: 0 0 20px #0ff, 0 0 30px #0ff; }
        }
        
        .game-info {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
            z-index: 1;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px currentColor;
        }
        
        #gameCanvas {
            border: 3px solid #0f0;
            border-radius: 5px;
            box-shadow: 
                0 0 30px rgba(0,255,0,0.4),
                0 0 60px rgba(0,255,0,0.2),
                inset 0 0 100px rgba(0,0,0,0.5);
            background: #000;
        }
        
        .back {
            margin-top: 20px;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            background: linear-gradient(180deg, #00cc6a, #009950);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,200,100,0.5);
            z-index: 1;
        }
        
        .back:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,200,100,0.7);
        }
        
        .controls-info {
            color: rgba(255,255,255,0.5);
            font-size: 8px;
            margin-top: 15px;
            text-align: center;
            z-index: 1;
        }
        
        .game-over {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }
        
        .game-over.active { display: flex; }
        
        .game-over h2 {
            color: #f00;
            font-size: 36px;
            margin-bottom: 20px;
            animation: pulse 1s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .game-over p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            background: linear-gradient(180deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .menu-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        
        .menu-overlay h2 {
            color: #fff;
            font-size: 20px;
            margin-bottom: 20px;
        }
        
        .start-btn {
            padding: 20px 40px;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            background: linear-gradient(180deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            animation: blink 1s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
    <h1>SNAKE</h1>
    
    <div class="game-info">
        <div class="info-item">
            <div class="info-label">ОЧКИ</div>
            <div class="info-value" id="scoreValue" style="color: #ff0;">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">РЕКОРД</div>
            <div class="info-value" id="highScoreValue" style="color: #f0f;">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">ДЛИНА</div>
            <div class="info-value" id="lengthValue" style="color: #0ff;">1</div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    
    <a href="../index.html" class="back">НАЗАД</a>
    
    <div class="controls-info">
        ← ↑ → ↓ : движение | SPACE : пауза
    </div>
    
    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Очки: <span id="finalScore">0</span></p>
        <button class="restart-btn" onclick="restartGame()">ЕЩЁ РАЗ</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID = 20;
        const CELL = canvas.width / GRID;
        
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameStarted = false;
        let isPaused = false;
        let gameOver = false;
        
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.beginPath();
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
            };
        }
        
        document.getElementById('highScoreValue').textContent = highScore;
        
        function spawnFood() {
            let valid = false;
            while(!valid) {
                food = {
                    x: Math.floor(Math.random() * GRID),
                    y: Math.floor(Math.random() * GRID)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y);
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(0,255,0,0.1)';
            ctx.lineWidth = 1;
            for(let i = 0; i < GRID; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL, 0);
                ctx.lineTo(i * CELL, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL);
                ctx.lineTo(canvas.width, i * CELL);
                ctx.stroke();
            }
            
            for(let i = 0; i < snake.length; i++) {
                const s = snake[i];
                const isHead = i === 0;
                const alpha = 1 - (i / snake.length) * 0.5;
                
                const gradient = ctx.createRadialGradient(
                    s.x * CELL + CELL/2, s.y * CELL + CELL/2, 0,
                    s.x * CELL + CELL/2, s.y * CELL + CELL/2, CELL/2
                );
                
                if(isHead) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc66');
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#0f0';
                } else {
                    gradient.addColorStop(0, `rgba(0, 255, 100, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 200, 80, ${alpha})`);
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillStyle = gradient;
                
                const radius = isHead ? 4 : 3;
                ctx.beginPath();
                ctx.roundRect(s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4, radius);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            }
            
            if(food.x >= 0) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff4444';
                
                const gradient = ctx.createRadialGradient(
                    food.x * CELL + CELL/2, food.y * CELL + CELL/2, 0,
                    food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2
                );
                gradient.addColorStop(0, '#ff6666');
                gradient.addColorStop(1, '#ff0000');
                ctx.fillStyle = gradient;
                
                ctx.beginPath();
                ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(food.x * CELL + CELL/3, food.y * CELL + CELL/3, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            }
        }
        
        function update() {
            if(!gameStarted || isPaused || gameOver) return;
            
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            if(head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
               snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver = true;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOver').classList.add('active');
                return;
            }
            
            snake.unshift(head);
            
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('scoreValue').textContent = score;
                document.getElementById('lengthValue').textContent = snake.length;
                
                if(score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    document.getElementById('highScoreValue').textContent = highScore;
                }
                
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
            setTimeout(update, Math.max(50, 150 - snake.length));
        }
        
        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            gameStarted = false;
            gameOver = false;
            
            document.getElementById('scoreValue').textContent = 0;
            document.getElementById('lengthValue').textContent = 1;
            document.getElementById('gameOver').classList.remove('active');
            
            spawnFood();
            draw();
        }
        
        document.addEventListener('keydown', e => {
            if(gameOver) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    if(direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if(direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
                case 'ArrowUp':
                    if(direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if(direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case ' ':
                    if(!gameStarted) {
                        gameStarted = true;
                        update();
                    } else {
                        isPaused = !isPaused;
                        if(!isPaused) update();
                    }
                    break;
            }
            
            if(!gameStarted && (nextDirection.x !== 0 || nextDirection.y !== 0)) {
                gameStarted = true;
                update();
            }
            
            e.preventDefault();
        });
        
        snake = [{ x: 10, y: 10 }];
        direction = { x: 1, y: 0 };
        nextDirection = { x: 1, y: 0 };
        spawnFood();
        draw();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Змейка</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Press Start 2P', cursive;
            background: linear-gradient(135deg, #0d2818, #1a4731, #0d2818);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(0,255,100,0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 20%, rgba(0,255,200,0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        h1 {
            color: #0f0;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #0f0, 0 0 20px #0f0;
            animation: glow 2s ease-in-out infinite alternate;
            z-index: 1;
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
            to { text-shadow: 0 0 20px #0ff, 0 0 30px #0ff; }
        }
        
        .game-info {
            display: flex;
            gap: 40px;
            margin-bottom: 15px;
            z-index: 1;
        }
        
        .info-item {
            text-align: center;
        }
        
        .info-label {
            color: rgba(255,255,255,0.6);
            font-size: 10px;
            margin-bottom: 5px;
        }
        
        .info-value {
            color: #fff;
            font-size: 18px;
            text-shadow: 0 0 10px currentColor;
        }
        
        #gameCanvas {
            border: 3px solid #0f0;
            border-radius: 5px;
            box-shadow: 
                0 0 30px rgba(0,255,0,0.4),
                0 0 60px rgba(0,255,0,0.2),
                inset 0 0 100px rgba(0,0,0,0.5);
            background: #000;
            cursor: none;
        }
        
        .back {
            margin-top: 20px;
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            background: linear-gradient(180deg, #00cc6a, #009950);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(0,200,100,0.5);
            z-index: 1;
        }
        
        .back:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0,200,100,0.7);
        }
        
        .controls-info {
            color: rgba(255,255,255,0.5);
            font-size: 8px;
            margin-top: 15px;
            text-align: center;
            z-index: 1;
        }
        
        .ai-indicator {
            color: #0f0;
            font-size: 10px;
            margin-top: 10px;
            z-index: 1;
        }
        
        .game-over {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }
        
        .game-over.active { display: flex; }
        
        .game-over h2 {
            color: #f00;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .game-over p {
            color: #fff;
            font-size: 18px;
            margin-bottom: 30px;
        }
        
        .restart-btn {
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            background: linear-gradient(180deg, #00ff88, #00cc6a);
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>SNAKE AI</h1>
    
    <div class="game-info">
        <div class="info-item">
            <div class="info-label">ОЧКИ</div>
            <div class="info-value" id="scoreValue" style="color: #ff0;">0</div>
        </div>
        <div class="info-item">
            <div class="info-label">ДЛИНА</div>
            <div class="info-value" id="lengthValue" style="color: #0ff;">1</div>
        </div>
    </div>
    
    <canvas id="gameCanvas" width="500" height="500"></canvas>
    
    <div class="ai-indicator">🤖 АВТОМАТИЧЕСКИЙ РЕЖИМ</div>
    <a href="../index.html" class="back">НАЗАД</a>
    
    <div class="game-over" id="gameOver">
        <h2>GAME OVER</h2>
        <p>Очки: <span id="finalScore">0</span></p>
        <p>Достигнута длина: <span id="finalLength">0</span></p>
        <button class="restart-btn" onclick="restartGame()">ЕЩЁ РАЗ</button>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GRID = 20;
        const CELL = canvas.width / GRID;
        
        let snake = [];
        let direction = { x: 1, y: 0 };
        let food = { x: 0, y: 0 };
        let score = 0;
        let gameOver = false;
        
        function spawnFood() {
            let valid = false;
            let attempts = 0;
            while(!valid && attempts < 1000) {
                food = {
                    x: Math.floor(Math.random() * GRID),
                    y: Math.floor(Math.random() * GRID)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y);
                attempts++;
            }
            if(!valid) {
                food = { x: Math.floor(GRID/2), y: Math.floor(GRID/2) };
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(0,255,0,0.1)';
            ctx.lineWidth = 1;
            for(let i = 0; i <= GRID; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL, 0);
                ctx.lineTo(i * CELL, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL);
                ctx.lineTo(canvas.width, i * CELL);
                ctx.stroke();
            }
            
            for(let i = 0; i < snake.length; i++) {
                const s = snake[i];
                const isHead = i === 0;
                const alpha = 1 - (i / snake.length) * 0.5;
                
                const gradient = ctx.createRadialGradient(
                    s.x * CELL + CELL/2, s.y * CELL + CELL/2, 0,
                    s.x * CELL + CELL/2, s.y * CELL + CELL/2, CELL/2
                );
                
                if(isHead) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc66');
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = '#0f0';
                } else {
                    gradient.addColorStop(0, `rgba(0, 255, 100, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 200, 80, ${alpha})`);
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillStyle = gradient;
                
                if (!CanvasRenderingContext2D.prototype.roundRect) {
                    ctx.fillRect(s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4);
                } else {
                    const radius = isHead ? 4 : 3;
                    ctx.beginPath();
                    ctx.roundRect(s.x * CELL + 2, s.y * CELL + 2, CELL - 4, CELL - 4, radius);
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0;
            }
            
            if(food.x >= 0) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ff4444';
                
                const gradient = ctx.createRadialGradient(
                    food.x * CELL + CELL/2, food.y * CELL + CELL/2, 0,
                    food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2
                );
                gradient.addColorStop(0, '#ff6666');
                gradient.addColorStop(1, '#ff0000');
                ctx.fillStyle = gradient;
                
                ctx.beginPath();
                ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(food.x * CELL + CELL/3, food.y * CELL + CELL/3, 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
            }
        }
        
        function bfsPath(startX, startY, targetX, targetY) {
            const queue = [{ x: startX, y: startY, path: [] }];
            const visited = new Set();
            visited.add(`${startX},${startY}`);
            
            const dirs = [
                { x: 0, y: -1 },
                { x: 1, y: 0 },
                { x: 0, y: 1 },
                { x: -1, y: 0 }
            ];
            
            while(queue.length > 0) {
                const current = queue.shift();
                
                if(current.x === targetX && current.y === targetY) {
                    return current.path[0];
                }
                
                for(const dir of dirs) {
                    const nx = current.x + dir.x;
                    const ny = current.y + dir.y;
                    const key = `${nx},${ny}`;
                    
                    if(nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) continue;
                    if(visited.has(key)) continue;
                    if(snake.slice(0, Math.min(snake.length, 5)).some(s => s.x === nx && s.y === ny)) continue;
                    
                    visited.add(key);
                    queue.push({
                        x: nx,
                        y: ny,
                        path: [...current.path, dir]
                    });
                }
            }
            
            return null;
        }
        
        function findSafeMove() {
            const head = snake[0];
            
            const dirs = [
                { x: 0, y: -1, name: 'up' },
                { x: 1, y: 0, name: 'right' },
                { x: 0, y: 1, name: 'down' },
                { x: -1, y: 0, name: 'left' }
            ];
            
            const safeDirs = dirs.filter(dir => {
                const nx = head.x + dir.x;
                const ny = head.y + dir.y;
                if(nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) return false;
                return !snake.some(s => s.x === nx && s.y === ny);
            });
            
            if(safeDirs.length === 0) return null;
            
            const pathToFood = bfsPath(head.x, head.y, food.x, food.y);
            if(pathToFood) return pathToFood;
            
            return safeDirs[Math.floor(Math.random() * safeDirs.length)];
        }
        
        function update() {
            if(gameOver) return;
            
            const head = snake[0];
            const move = findSafeMove();
            
            if(!move) {
                gameOver = true;
                document.getElementById('finalScore').textContent = score;
                document.getElementById('finalLength').textContent = snake.length;
                document.getElementById('gameOver').classList.add('active');
                return;
            }
            
            direction = move;
            const newHead = { x: head.x + move.x, y: head.y + move.y };
            
            snake.unshift(newHead);
            
            if(newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                document.getElementById('scoreValue').textContent = score;
                document.getElementById('lengthValue').textContent = snake.length;
                spawnFood();
            } else {
                snake.pop();
            }
            
            draw();
            
            setTimeout(update, Math.max(30, 120 - snake.length * 2));
        }
        
        function restartGame() {
            snake = [{ x: 10, y: 10 }];
            direction = { x: 1, y: 0 };
            score = 0;
            gameOver = false;
            
            document.getElementById('scoreValue').textContent = 0;
            document.getElementById('lengthValue').textContent = 1;
            document.getElementById('gameOver').classList.remove('active');
            
            spawnFood();
            draw();
            update();
        }
        
        snake = [{ x: 10, y: 10 }];
        direction = { x: 1, y: 0 };
        spawnFood();
        draw();
        update();
    </script>
</body>
</html>
